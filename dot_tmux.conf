#!/usr/bin/env bash
# Generated by OpenCode AI - 2026-01-20
# Modern tmux configuration with TokyoNight theme and sensible defaults
#
# NOTE: Uses CTRL+A as prefix (matching your WezTerm setup)
# Plugins: tmux-sensible, tmux-resurrect, tmux-continuum, tmux-sessionist, tmux-yank, tmux-which-key

# ============================================================================
# General Settings
# ============================================================================

# 1. Tell applications INSIDE tmux to use tmux's internal dictionary
set -g default-terminal "tmux-256color"

# 2. Tell tmux that the OUTSIDE terminal (xterm-ghostty) supports italics (sitm)
# Note: 'Tc' enables TrueColor (24-bit), which your TokyoNight theme needs!
set -as terminal-overrides ',xterm-ghostty:Tc:sitm=\E[3m'

# Enable mouse support
set -g mouse on

# Set scrollback buffer to 10000
set -g history-limit 10000

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Allow automatic renaming of windows
set -g automatic-rename on

# Set window title
set -g set-titles on

# Faster command sequences (reduce delay)
set -s escape-time 0

# Increase tmux messages display duration
set -g display-time 2000

# Focus events enabled for terminals that support them
set -g focus-events on

# Disable activity monitoring (prevents flashing and # symbols on tabs)
setw -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# ============================================================================
# Prefix Key (CTRL+A like your WezTerm config)
# ============================================================================

# Change prefix from C-b to C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================================
# Key Bindings (matching your WezTerm setup)
# ============================================================================

# Reload configuration
bind R source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes (matching WezTerm: Leader+| and Leader+-)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (vim-style: h,j,k,l)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Also support CTRL+SHIFT for pane navigation (like WezTerm)
bind -n C-S-h select-pane -L
bind -n C-S-j select-pane -D
bind -n C-S-k select-pane -U
bind -n C-S-l select-pane -R

# Pane resizing (Leader+r then hjkl)
bind r switch-client -T resize
bind -T resize h resize-pane -L 3
bind -T resize j resize-pane -D 3
bind -T resize k resize-pane -U 3
bind -T resize l resize-pane -R 3
bind -T resize Escape switch-client -T root
bind -T resize Enter switch-client -T root
bind -T resize q switch-client -T root

# Close pane (Leader+x)
bind x kill-pane

# Toggle pane zoom (Leader+z)
bind z resize-pane -Z

# Rotate panes (Leader+Space)
bind Space rotate-window

# Create new window (Leader+c)
bind c new-window -c "#{pane_current_path}"

# Close window (Leader+&)
bind & kill-window

# Window navigation (Leader+n/p)
bind n next-window
bind p previous-window

# Rename window (Leader+,)
bind , command-prompt -I "#W" "rename-window '%%'"

# Move window left/right (Leader+</Leader+>)
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# Quick window selection (Leader+1-9)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Copy mode (Leader+[) with vim bindings
bind [ copy-mode
setw -g mode-keys vi

# Copy mode vim-style bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel

# Paste from clipboard (Leader+])
bind ] paste-buffer

# Search (Leader+/)
bind / copy-mode \; send-keys "/"

# Command palette (Leader+:)
bind : command-prompt

# Session management (Leader+s for session list)
bind s choose-session

# Create new session (Leader+C-c)
bind C-c command-prompt -p "New session name:" "new-session -s '%%'"

# Rename session (Leader+$)
bind C-, command-prompt -I "#S" "rename-session '%%'"

# ============================================================================
# Custom Status Bar Configuration (Tokyo Night Theme)
# ============================================================================
# TokyoNight Night theme colors:
# Blue (locked mode): #7aa2f7
# Orange (unlocked/command mode): #ff9e64
# Default bg:#1a1b26

# Enable the status bar
set -g status on

# Position at top
set -g status-position top

# Status bar refresh interval (update every second for mode changes)
set -g status-interval 1

# Status bar background color (Tokyo Night Night bg)
set -g status-bg "#16161E"

# Status bar text color (Tokyo Night foreground)
set -g status-fg "#a9b1d6"

# Status bar format strings
# Left side: Session name with lock indicator, colored by mode
# When client_prefix is active (command mode/prefix pressed): orange 🔓
# When client_prefix is NOT active (locked/normal mode): blue 🔒

# Session/Mode indicator with color based on prefix key state
# client_prefix is true when prefix key has been pressed and awaiting command
set -g status-left "#{?client_prefix,#[bg=green fg=#1a1b26]  #{session_name} #[default],#[bg=blue fg=#1a1b26]  #{session_name} #[default]} "

# Left side length
set -g status-left-length 51

# Window list format with index and name
# Separator between components is a space (you can customize this)
setw -g window-status-format "#[fg=blue]#{window_index}#[default] #{window_name}"
setw -g window-status-current-format "#[fg=cyan bold][#{window_index}]#[default bold] #{window_name}"

# Window list separator
setw -g window-status-separator " > "


# Right side: Username with green when prefix active, blue otherwise
set -g status-right "#{?client_prefix,#[bg=green fg=#1a1b26]  #{user} #[default],#[bg=blue fg=#1a1b26]  #{user} #[default]}"

# Right side length
set -g status-right-length 30

# ============================================================================
# Plugin Manager (TPM) - Plugins List
# ============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'

# ============================================================================
# Plugin Configuration
# ============================================================================

# tmux-resurrect settings
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-save-shell-history 'on'

# tmux-continuum settings (auto-save every 15 minutes)
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# tmux-yank settings
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

# ============================================================================
# Initialize TPM (keep this at the very bottom)
# ============================================================================

# NOTE: Install TPM first with:
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins

run '~/.tmux/plugins/tpm/tpm'
